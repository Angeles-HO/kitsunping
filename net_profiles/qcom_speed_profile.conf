# Qualcomm WCNSS profile: speed (throughput-oriented)
gChannelBondingMode24GHz=1
gChannelBondingMode5GHz=1
gForce1x1Exception=0
sae_enabled=1
BandCapability=0
gEnableTxSUBeamformer=1
gEnableNUDTracking=2
gEnableModulatedDTIM=3
gMaxLIModulatedDTIM=6
gTxAggregationSize=1024
gRxAggregationSize=1024
# WiFi 6 (802.11ax) — aggressive for throughput
he_mcs_12_13_support=1
enable_twt=1
enable_twt_24ghz=0
enable_dl_ofdma=1
enable_ul_ofdma=1
enable_ul_mimo=1
he_ul_gi=1
bss_color=1
gTcpDelAckEnable=1
gHandleLatencyCriticalClients=1
wlm_latency_enable=1
