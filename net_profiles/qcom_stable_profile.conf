# Qualcomm WCNSS profile: stable (compatibility and battery oriented)
gChannelBondingMode24GHz=1
gChannelBondingMode5GHz=1
gForce1x1Exception=0
sae_enabled=1
BandCapability=0
gEnableTxSUBeamformer=0
gEnableNUDTracking=1
gEnableModulatedDTIM=1
gMaxLIModulatedDTIM=3
gper_roam_enabled=0
# WiFi 6 (802.11ax) — conservative for stable/battery
he_mcs_12_13_support=0
enable_twt=1
enable_twt_24ghz=1
enable_dl_ofdma=1
enable_ul_ofdma=0
enable_ul_mimo=0
he_ul_gi=0
bss_color=0
gTcpDelAckEnable=0
gHandleLatencyCriticalClients=0
wlm_latency_enable=0
